server:
  port: ${PORT:8081}

spring:
  application:
    name: catalogue-service
  datasource:
    url: ${BD_CATALOGUE_URL:jdbc:postgresql://localhost:5433/catalogue_db}
    username: ${BD_CATALOGUE_USERNAME:catalogue_user}
    password: ${BD_CATALOGUE_PASS:catalogue_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}