server:
  port: ${PORT:8083}

spring:
  application:
    name: users-service

  datasource:
    url: ${BD_USERS_URL:jdbc:postgresql://localhost:5435/users_db}
    username: ${BD_USERS_USERNAME:users_user}
    password: ${BD_USERS_PASS:users_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

app:
  jwt:
    secret: ${JWT_SECRET:relatosdepapel-users-service-secret-key-minimum-32-characters}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}

  opaque-token:
    expiration-ms: ${OPAQUE_TOKEN_EXPIRATION_MS:900000}

  refresh-token:
    expiration-days: ${REFRESH_TOKEN_EXPIRATION_DAYS:7}