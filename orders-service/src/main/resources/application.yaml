server:
  port: ${PORT:8082}

spring:
  application:
    name: orders-service

  datasource:
    url: ${BD_ORDERS_URL:jdbc:postgresql://localhost:5434/orders_db}
    username: ${BD_ORDERS_USERNAME:orders_user}
    password: ${BD_ORDERS_PASS:orders_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}



